<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D9488"/>
      <stop offset="100%" style="stop-color:#0F766E"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D97706"/>
      <stop offset="100%" style="stop-color:#B45309"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="url(#bg)" stroke="#2DD4BF" stroke-width="3"/>
  <!-- Book icon -->
  <rect x="34" y="30" width="60" height="55" rx="6" fill="white" opacity="0.95"/>
  <rect x="34" y="30" width="60" height="12" rx="6" fill="url(#accent)"/>
  <line x1="40" y1="50" x2="60" y2="50" stroke="#134E4A" stroke-width="2" opacity="0.3"/>
  <line x1="40" y1="58" x2="68" y2="58" stroke="#134E4A" stroke-width="2" opacity="0.3"/>
  <line x1="40" y1="66" x2="55" y2="66" stroke="#134E4A" stroke-width="2" opacity="0.3"/>
  <!-- Letter Z -->
  <text x="64" y="74" font-family="Arial Black, sans-serif" font-size="28" font-weight="bold" 
        fill="#0D9488" text-anchor="middle">Z</text>
  <!-- Gear icon (CMS) -->
  <circle cx="96" cy="32" r="14" fill="url(#accent)" stroke="white" stroke-width="2"/>
  <circle cx="96" cy="32" r="6" fill="white"/>
  <!-- Sparkle dots -->
  <circle cx="24" cy="28" r="3" fill="#F59E0B"/>
  <circle cx="108" cy="80" r="2.5" fill="#2DD4BF"/>
  <circle cx="20" cy="90" r="2" fill="#F59E0B"/>
</svg>
